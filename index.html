<!--
EntreLinhas v287 - recuperação cirúrgica da guia inicial sem travar abertura do app
Base obrigatória: EntreLinhas_v284_MENU_LATERAL_CLICK_UNICO_SEM_TRAVAR.html

Motivo:
- A v285 abriu a guia sem estilo em alguns testes.
- A v286 ficou agressiva demais no carregamento e pode impedir a abertura normal do app.

Objetivo desta v287:
- Recuperar o app primeiro.
- Corrigir somente a guia inicial/tela de boas-vindas/card em Configurações.
- Não abrir a guia automaticamente durante o boot do app.
- Abrir a guia somente por comando manual ou pelo card em Configurações.
- Remover visualmente apenas os restos quebrados da guia v278/v285/v286.

Não altera:
- menu lateral;
- egress;
- Supabase;
- snapshots;
- push;
- service-worker;
- login;
- leitor EPUB;
- ranking;
- metas;
- chat;
- notificações.

Como aplicar:
1. Voltar para a base segura v284, se possível.
2. Não usar v285 nem v286.
3. Colar este bloco inteiro imediatamente ANTES de </body>.
4. Salvar como EntreLinhas_v287_GUIA_INICIAL_RECUPERADA_SEM_AUTO_TRAVAR_CIRURGICO.html.

Se você já colou v285/v286 e não consegue limpar agora:
- Cole este v287 depois deles, antes de </body>, para neutralizar os elementos quebrados.
- O ideal ainda é partir da v284 limpa.
-->

<script id="entrel-v287-guia-inicial-recuperacao">
(function(){
  'use strict';

  window.__ENTREL_V287_GUIA_RECUPERACAO_SEM_AUTO_TRAVAR__ = true;

  var STORAGE_KEY = 'entrel:onboarding:v278:seen';
  var slideIndex = 0;
  var slides = [
    {icon:'🌸',title:'Bem-vinda ao EntreLinhas',text:'Este é o espaço do clube para acompanhar leituras, metas, conquistas e participação de forma organizada.',pills:['Clube do livro','Leitura pessoal','Progresso salvo']},
    {icon:'🏠',title:'Prólogo',text:'No Prólogo ficam o resumo da sua jornada, continue lendo, meta diária, calendário, sequência e Livro do Clube.',pills:['Continue lendo','Metas','Calendário']},
    {icon:'📚',title:'Minha Leitura',text:'Adicione livros e EPUBs pessoais, registre páginas lidas e retome sua leitura do ponto em que parou.',pills:['Biblioteca pessoal','EPUB','Progresso']},
    {icon:'💬',title:'Clube',text:'A área Clube reúne Livro do Clube, Biblioteca, Mural, fotos dos encontros e estatísticas do grupo.',pills:['Livro do Clube','Mural','Fotos']},
    {icon:'🏅',title:'Desafios e Ranking',text:'Complete desafios, ganhe XP, desbloqueie medalhas e molduras, e acompanhe sua evolução no ranking.',pills:['XP','Medalhas','Ranking']},
    {icon:'✨',title:'Tudo pronto para começar',text:'Use o app no seu ritmo. Suas leituras, metas e conquistas formam sua jornada dentro do EntreLinhas.',pills:['Explorar app','Boa leitura','Começar']}
  ];

  function safeText(value){
    return String(value == null ? '' : value).replace(/[&<>"']/g,function(ch){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch] || ch;
    });
  }

  function currentUserKey(){
    var id = 'local';
    try{
      if(typeof data !== 'undefined' && data && data.user){
        id = data.user.id || data.user.email || data.user.name || 'local';
      }
    }catch(e){}
    return STORAGE_KEY + ':' + String(id || 'local');
  }

  function markSeen(){
    try{ localStorage.setItem(currentUserKey(),'1'); }catch(e){}
  }

  function clearSeen(){
    try{
      localStorage.removeItem(currentUserKey());
      localStorage.removeItem(STORAGE_KEY);
    }catch(e){}
  }

  function neutralizeOldGuides(){
    var selectors = [
      '#entrel-welcome-v278',
      '#entrel-guide-v286',
      '.entrel-welcome-v278-backdrop',
      '.entrel-welcome-v278-settings-card',
      '[data-entrel-v285-guia-card]',
      '[data-entrel-v286-guia-card]'
    ];
    try{
      selectors.forEach(function(sel){
        document.querySelectorAll(sel).forEach(function(el){
          try{ el.remove(); }catch(e){}
        });
      });
    }catch(e){}
    try{ document.body.style.overflow = ''; }catch(e){}
  }

  function logoMarkup(){
    return '<img src="assets/img_001_6644f517278f.png" alt="Logo EntreLinhas" loading="eager" decoding="async">';
  }

  function ensureModal(){
    neutralizeOldGuides();

    var modal = document.getElementById('entrel-guide-v287');
    if(!modal){
      modal = document.createElement('div');
      modal.id = 'entrel-guide-v287';
      modal.setAttribute('role','dialog');
      modal.setAttribute('aria-modal','true');
      modal.setAttribute('aria-label','Guia inicial do EntreLinhas');
      modal.innerHTML = ''+
        '<div class="entrel-guide-v287-modal">'+
          '<div class="entrel-guide-v287-inner">'+
            '<div class="entrel-guide-v287-head">'+
              '<div class="entrel-guide-v287-brand">'+
                '<div class="entrel-guide-v287-logo">'+logoMarkup()+'</div>'+
                '<div><span class="entrel-guide-v287-name">EntreLinhas</span><span class="entrel-guide-v287-sub">Girls Book Club</span></div>'+
              '</div>'+
              '<button class="entrel-guide-v287-close" type="button" data-entrel-guide-v287="close" aria-label="Fechar guia">×</button>'+
            '</div>'+
            '<div class="entrel-guide-v287-card" id="entrel-guide-v287-slide"></div>'+
            '<div class="entrel-guide-v287-dots" id="entrel-guide-v287-dots"></div>'+
            '<div class="entrel-guide-v287-actions">'+
              '<button class="entrel-guide-v287-btn secondary" type="button" data-entrel-guide-v287="back" id="entrel-guide-v287-back">Voltar</button>'+
              '<button class="entrel-guide-v287-btn primary" type="button" data-entrel-guide-v287="next" id="entrel-guide-v287-next">Continuar</button>'+
            '</div>'+
          '</div>'+
        '</div>';
      document.body.appendChild(modal);
    }

    if(!modal.__entrelV287Click){
      modal.__entrelV287Click = true;
      modal.addEventListener('click',function(ev){
        try{
          if(ev.target === modal){ window.entrelFecharGuiaV278(true); return; }
          var target = ev.target && ev.target.closest ? ev.target.closest('[data-entrel-guide-v287]') : null;
          if(!target) return;
          var action = target.getAttribute('data-entrel-guide-v287');
          if(action === 'close') window.entrelFecharGuiaV278(true);
          if(action === 'back') window.entrelGuiaAnteriorV278();
          if(action === 'next') window.entrelGuiaProximoV278();
        }catch(e){}
      },true);
    }

    return modal;
  }

  function render(){
    var s = slides[slideIndex] || slides[0];
    var slide = document.getElementById('entrel-guide-v287-slide');
    var dots = document.getElementById('entrel-guide-v287-dots');
    var back = document.getElementById('entrel-guide-v287-back');
    var next = document.getElementById('entrel-guide-v287-next');
    if(!slide || !dots || !back || !next) return;

    slide.innerHTML = ''+
      '<div class="entrel-guide-v287-icon">'+safeText(s.icon)+'</div>'+
      '<h2 class="entrel-guide-v287-title">'+safeText(s.title)+'</h2>'+
      '<p class="entrel-guide-v287-text">'+safeText(s.text)+'</p>'+
      '<div class="entrel-guide-v287-list">'+
        (s.pills || []).map(function(item){
          return '<div class="entrel-guide-v287-pill"><span class="entrel-guide-v287-check">✓</span><span>'+safeText(item)+'</span></div>';
        }).join('')+
      '</div>';

    dots.innerHTML = slides.map(function(_,i){
      return '<span class="entrel-guide-v287-dot '+(i === slideIndex ? 'is-active' : '')+'"></span>';
    }).join('');

    back.textContent = slideIndex === 0 ? 'Pular' : 'Voltar';
    next.textContent = slideIndex === slides.length - 1 ? 'Entrar no app' : 'Continuar';
  }

  window.entrelAbrirGuiaAppV278 = function(force){
    slideIndex = 0;
    var modal = ensureModal();
    render();
    modal.classList.add('entrel-guide-v287-open');
    return true;
  };

  window.entrelFecharGuiaV278 = function(save){
    var modal = document.getElementById('entrel-guide-v287');
    if(modal) modal.classList.remove('entrel-guide-v287-open');
    try{ document.body.style.overflow = ''; }catch(e){}
    if(save !== false) markSeen();
    return true;
  };

  window.entrelGuiaProximoV278 = function(){
    if(slideIndex < slides.length - 1){
      slideIndex++;
      render();
    }else{
      window.entrelFecharGuiaV278(true);
    }
    return true;
  };

  window.entrelGuiaAnteriorV278 = function(){
    if(slideIndex <= 0){
      window.entrelFecharGuiaV278(true);
    }else{
      slideIndex--;
      render();
    }
    return true;
  };

  window.entrelResetGuiaAppV278 = function(){
    clearSeen();
    return true;
  };

  window.entrelResetEAbrirGuiaAppV287 = function(){
    clearSeen();
    return window.entrelAbrirGuiaAppV278(true);
  };

  function settingsCardHTML(){
    return ''+
      '<section class="settings-card-v1863 entrel-guide-v287-settings-card" data-entrel-v287-guia-card="1">'+
        '<div class="settings-head-v1863">'+
          '<div>'+
            '<strong class="entrel-guide-v287-settings-title">✨ Guia inicial do app</strong>'+
            '<p class="entrel-guide-v287-settings-text">Reveja a tela de boas-vindas e entenda as principais áreas do EntreLinhas.</p>'+
          '</div>'+
        '</div>'+
        '<div class="settings-note-v1863 entrel-guide-v287-settings-note">O guia fica manual para não interferir no carregamento do app.</div>'+
        '<div class="entrel-guide-v287-settings-actions">'+
          '<button class="entrel-guide-v287-settings-btn" type="button" onclick="entrelAbrirGuiaAppV278(true)">Ver guia do app</button>'+
          '<button class="entrel-guide-v287-settings-btn secondary" type="button" onclick="entrelResetEAbrirGuiaAppV287()">Mostrar novamente</button>'+
        '</div>'+
      '</section>';
  }

  function injectCardIntoString(html){
    var out = String(html || '');
    if(out.indexOf('data-entrel-v287-guia-card') >= 0) return out;
    out = out.replace(/<section[^>]*(?:entrel-welcome-v278-settings-card|data-entrel-v285-guia-card|data-entrel-v286-guia-card)[\s\S]*?<\/section>/g,'');
    var card = settingsCardHTML();
    var firstCard = out.indexOf('<section class="settings-card-v1863"');
    if(firstCard >= 0) return out.slice(0,firstCard) + card + out.slice(firstCard);
    var lastDiv = out.lastIndexOf('</div>');
    if(lastDiv >= 0) return out.slice(0,lastDiv) + card + out.slice(lastDiv);
    return out + card;
  }

  function injectCardIntoDOM(){
    try{
      var root = document.querySelector('.settings-v1863') || document.querySelector('[class*="settings"]');
      if(!root) return false;
      root.querySelectorAll('.entrel-welcome-v278-settings-card,[data-entrel-v285-guia-card],[data-entrel-v286-guia-card]').forEach(function(el){
        try{ el.remove(); }catch(e){}
      });
      if(root.querySelector('[data-entrel-v287-guia-card]')) return true;
      var box = document.createElement('div');
      box.innerHTML = settingsCardHTML();
      if(box.firstElementChild) root.insertBefore(box.firstElementChild, root.firstElementChild || null);
      return true;
    }catch(e){
      return false;
    }
  }

  function wrapSettings(name){
    try{
      var old = window[name];
      if(typeof old !== 'function') return false;
      if(old.__entrelV287GuideSafe) return true;
      var wrapped = function(){
        var result = old.apply(this, arguments);
        setTimeout(injectCardIntoDOM,0);
        if(typeof result === 'string') return injectCardIntoString(result);
        return result;
      };
      wrapped.__entrelV287GuideSafe = true;
      wrapped.__entrelV286Guide = true;
      wrapped.__entrelV285Guide = true;
      wrapped.__oldSettings = old;
      window[name] = wrapped;
      try{ if(name === 'settingsScreenV1863') settingsScreenV1863 = wrapped; }catch(e){}
      try{ if(name === 'settingsScreenV65') settingsScreenV65 = wrapped; }catch(e){}
      try{ if(name === 'settingsScreenV66') settingsScreenV66 = wrapped; }catch(e){}
      return true;
    }catch(e){
      return false;
    }
  }

  function bootV287(){
    try{ neutralizeOldGuides(); }catch(e){}
    try{ ensureModal(); }catch(e){}
    try{ wrapSettings('settingsScreenV1863'); }catch(e){}
    try{ wrapSettings('settingsScreenV65'); }catch(e){}
    try{ wrapSettings('settingsScreenV66'); }catch(e){}
    try{ setTimeout(injectCardIntoDOM,250); }catch(e){}
    try{ console.info('[EntreLinhas v287] guia inicial recuperada sem auto abertura.'); }catch(e){}
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded',bootV287,{once:true});
  }else{
    bootV287();
  }
  setTimeout(bootV287,900);
