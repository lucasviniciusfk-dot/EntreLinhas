- A v285 reativou a guia, mas reaproveitou classes visuais v278 sem garantir o CSS completo.

- Corrigir somente a guia inicial/tela de boas-vindas/card de Configurações.

- Remover apenas o modal/card quebrado da guia anterior e recriar a guia com CSS próprio isolado.

Não altera:
- menu lateral;
- egress;
- Supabase;
- snapshots;
- push;
- service-worker;
- login;
- leitor EPUB;
- ranking;
- metas;
- chat;
- notificações.

Como aplicar:
1. Preferencialmente voltar para a base v284 segura.
2. Colar este bloco inteiro imediatamente ANTES de </body>.
3. Salvar como EntreLinhas_v286_GUIA_INICIAL_ESTILO_ISOLADO_CIRURGICO.html.

Observação:
- Também funciona se for colado depois do patch v285, porque limpa somente o modal/card quebrado da guia.
-->

<script id="entrel-v286-guia-inicial-estilo-isolado">
(function(){
  'use strict';

  if(window.__ENTREL_V286_GUIA_INICIAL_ESTILO_ISOLADO__) return;
  window.__ENTREL_V286_GUIA_INICIAL_ESTILO_ISOLADO__ = true;

  var VERSION = 'v286';
  var BASE_KEY = 'entrel:onboarding:v278:seen';
  var index = 0;

  var slides = [
    {
      icon:'🌸',
      title:'Bem-vinda ao EntreLinhas',
      text:'Este é o espaço do clube para acompanhar leituras, metas, conquistas e participação de um jeito mais bonito e organizado.',
      pills:['Clube do livro','Leitura pessoal','Progresso salvo']
    },
    {
      icon:'🏠',
      title:'Prólogo',
      text:'Aqui você vê o resumo da sua jornada: continue lendo, meta diária, meta mensal, calendário, sequência e Livro do Clube.',
      pills:['Continue lendo','Metas','Calendário']
    },
    {
      icon:'📚',
      title:'Minha Leitura',
      text:'Adicione livros e EPUBs pessoais, registre páginas lidas e retome sua leitura do ponto em que parou.',
      pills:['Biblioteca pessoal','EPUB','Progresso']
    },
    {
      icon:'💬',
      title:'Clube',
      text:'A área Clube reúne Livro do Clube, Biblioteca, Mural, fotos dos encontros e estatísticas do grupo.',
      pills:['Livro do Clube','Mural','Fotos']
    },
    {
      icon:'🏅',
      title:'Desafios e ranking',
      text:'Complete desafios, ganhe XP, desbloqueie medalhas e molduras, e acompanhe sua evolução no ranking.',
      pills:['XP','Medalhas','Ranking']
    },
    {
      icon:'✨',
      title:'Tudo pronto para começar',
      text:'Use o app no seu ritmo. Suas leituras, metas e conquistas formam sua jornada dentro do EntreLinhas.',
      pills:['Iniciar jornada','Explorar app','Boa leitura']
    }
  ];

  function esc(v){
    return String(v == null ? '' : v).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c] || c;
    });
  }

  function hasUser(){
    try{
      return !!(typeof data !== 'undefined' && data && data.user && (data.user.id || data.user.email || data.user.name));
    }catch(e){
      return false;
    }
  }

  function userKey(){
    try{
      var id = '';
      if(typeof data !== 'undefined' && data && data.user){
        id = data.user.id || data.user.email || data.user.name || '';
      }
      return BASE_KEY + ':' + String(id || 'local');
    }catch(e){
      return BASE_KEY + ':local';
    }
  }

  function seen(){
    try{
      return localStorage.getItem(userKey()) === '1' || localStorage.getItem(BASE_KEY) === '1';
    }catch(e){
      return true;
    }
  }

  function markSeen(){
    try{ localStorage.setItem(userKey(),'1'); }catch(e){}
  }

  function clearSeen(){
    try{
      localStorage.removeItem(userKey());
      localStorage.removeItem(BASE_KEY);
    }catch(e){}
  }

  function cleanupOldBrokenGuide(){
    try{
      var old = document.getElementById('entrel-welcome-v278');
      if(old) old.remove();
    }catch(e){}
    try{
      document.querySelectorAll('.entrel-welcome-v278-backdrop,.entrel-welcome-v278-settings-card,[data-entrel-v285-guia-card]').forEach(function(el){
        try{ el.remove(); }catch(e){}
      });
    }catch(e){}
  }

  function logoHTML(){
    return '<img src="assets/img_001_6644f517278f.png" alt="Logo EntreLinhas" loading="eager" decoding="async" onerror="this.outerHTML=\'<span>e</span>\'">';
  }

  function ensureModal(){
    cleanupOldBrokenGuide();

    var el = document.getElementById('entrel-guide-v286');
    if(!el){
      el = document.createElement('div');
      el.id = 'entrel-guide-v286';
      el.setAttribute('role','dialog');
      el.setAttribute('aria-modal','true');
      el.setAttribute('aria-label','Guia inicial do EntreLinhas');
      el.innerHTML =
        '<div class="entrel-guide-v286-modal">'+
          '<div class="entrel-guide-v286-inner">'+
            '<div class="entrel-guide-v286-top">'+
              '<div class="entrel-guide-v286-brand">'+
                '<div class="entrel-guide-v286-logo">'+logoHTML()+'</div>'+
                '<div>'+
                  '<span class="entrel-guide-v286-brand-title">EntreLinhas</span>'+
                  '<span class="entrel-guide-v286-brand-subtitle">Girls Book Club</span>'+
                '</div>'+
              '</div>'+
              '<button class="entrel-guide-v286-close" type="button" aria-label="Fechar guia" data-entrel-guide-v286="close">×</button>'+
            '</div>'+
            '<div class="entrel-guide-v286-card" id="entrel-guide-v286-slide"></div>'+
            '<div class="entrel-guide-v286-dots" id="entrel-guide-v286-dots"></div>'+
            '<div class="entrel-guide-v286-actions">'+
              '<button type="button" class="entrel-guide-v286-btn entrel-guide-v286-btn-secondary" id="entrel-guide-v286-back" data-entrel-guide-v286="back">Voltar</button>'+
              '<button type="button" class="entrel-guide-v286-btn entrel-guide-v286-btn-primary" id="entrel-guide-v286-next" data-entrel-guide-v286="next">Começar</button>'+
            '</div>'+
          '</div>'+
        '</div>';
      document.body.appendChild(el);
    }

    if(!el.__entrelV286GuideEvents){
      el.__entrelV286GuideEvents = true;
      el.addEventListener('click',function(ev){
        try{
          if(ev.target === el){ window.entrelFecharGuiaV278(true); return; }
          var btn = ev.target && ev.target.closest ? ev.target.closest('[data-entrel-guide-v286]') : null;
          var act = btn && btn.getAttribute('data-entrel-guide-v286');
          if(act === 'close') window.entrelFecharGuiaV278(true);
          if(act === 'back') window.entrelGuiaAnteriorV278();
          if(act === 'next') window.entrelGuiaProximoV278();
        }catch(e){}
      },true);
    }

    if(!document.__entrelV286GuideEsc){
      document.__entrelV286GuideEsc = true;
      document.addEventListener('keydown',function(ev){
        try{
          var box = document.getElementById('entrel-guide-v286');
          if(ev.key === 'Escape' && box && box.classList.contains('entrel-guide-v286-open')) window.entrelFecharGuiaV278(true);
        }catch(e){}
      },true);
    }

    return el;
  }

  function renderSlide(){
    var s = slides[index] || slides[0];
    var slide = document.getElementById('entrel-guide-v286-slide');
    var dots = document.getElementById('entrel-guide-v286-dots');
    var back = document.getElementById('entrel-guide-v286-back');
    var next = document.getElementById('entrel-guide-v286-next');
    if(!slide || !dots || !back || !next) return;

    slide.innerHTML =
      '<div class="entrel-guide-v286-icon">'+esc(s.icon)+'</div>'+
      '<h2 class="entrel-guide-v286-title">'+esc(s.title)+'</h2>'+
      '<p class="entrel-guide-v286-text">'+esc(s.text)+'</p>'+
      '<div class="entrel-guide-v286-list">'+
        (s.pills || []).map(function(p){
          return '<div class="entrel-guide-v286-pill"><span class="entrel-guide-v286-check">✓</span><span>'+esc(p)+'</span></div>';
        }).join('')+
      '</div>';

    dots.innerHTML = slides.map(function(_,i){
      return '<span class="entrel-guide-v286-dot '+(i === index ? 'entrel-guide-v286-active' : '')+'"></span>';
    }).join('');

    back.textContent = index === 0 ? 'Pular' : 'Voltar';
    next.textContent = index === 0 ? 'Começar' : (index === slides.length - 1 ? 'Entrar no app' : 'Continuar');
  }

  window.entrelAbrirGuiaAppV278 = function(force){
    if(!force && !hasUser()) return false;
    index = 0;
    var el = ensureModal();
    renderSlide();
    el.classList.add('entrel-guide-v286-open');
    try{ document.body.style.overflow = 'hidden'; }catch(e){}
    return true;
  };

  window.entrelFecharGuiaV278 = function(save){
    var el = document.getElementById('entrel-guide-v286') || ensureModal();
    el.classList.remove('entrel-guide-v286-open');
    try{ document.body.style.overflow = ''; }catch(e){}
    if(save !== false) markSeen();
  };

  window.entrelGuiaProximoV278 = function(){
    if(index < slides.length - 1){
      index++;
      renderSlide();
    }else{
      window.entrelFecharGuiaV278(true);
    }
  };

  window.entrelGuiaAnteriorV278 = function(){
    if(index <= 0){
      window.entrelFecharGuiaV278(true);
    }else{
      index--;
      renderSlide();
    }
  };

  window.entrelResetGuiaAppV278 = function(){
    clearSeen();
    return true;
  };

  window.entrelResetEAbrirGuiaAppV286 = function(){
    clearSeen();
    window.entrelAbrirGuiaAppV278(true);
    return true;
  };

  function guideCard(){
    return '<section class="settings-card-v1863 entrel-guide-v286-settings-card" data-entrel-v286-guia-card="1">'+
      '<div class="settings-head-v1863">'+
        '<div>'+
          '<strong class="entrel-guide-v286-settings-title">✨ Guia inicial do app</strong>'+
          '<p class="entrel-guide-v286-settings-text">Reveja a tela de boas-vindas e entenda as principais áreas do EntreLinhas.</p>'+
        '</div>'+
      '</div>'+
      '<div class="settings-note-v1863 entrel-guide-v286-settings-note">Ideal para novos membros entenderem Prólogo, Minha Leitura, Clube, Desafios, Medalhas e Ranking.</div>'+
      '<div class="entrel-guide-v286-settings-actions">'+
        '<button class="entrel-guide-v286-settings-btn" type="button" onclick="entrelAbrirGuiaAppV278(true)">Ver guia do app</button>'+
        '<button class="entrel-guide-v286-settings-btn secondary" type="button" onclick="entrelResetEAbrirGuiaAppV286()">Mostrar novamente</button>'+
      '</div>'+
    '</section>';
  }

  function injectCardIntoHTML(html){
    html = String(html || '');
    if(html.indexOf('data-entrel-v286-guia-card') >= 0) return html;

    html = html.replace(/<section[^>]*(?:entrel-welcome-v278-settings-card|data-entrel-v285-guia-card)[\s\S]*?<\/section>/g,'');
