<!--
EntreLinhas v285 - correção cirúrgica do guia inicial / boas-vindas
Base obrigatória: EntreLinhas_v284_MENU_LATERAL_CLICK_UNICO_SEM_TRAVAR.html

Objetivo:
- Reativar a guia inicial/tela de boas-vindas.
- Garantir o card "Guia inicial do app" em Configurações.
- Manter a logo oficial no guia sem quebrar JavaScript.

Não altera:
- menu lateral;
- egress;
- Supabase;
- snapshots;
- push;
- service-worker;
- login;
- leitor EPUB;
- ranking;
- metas;
- chat;
- notificações.

Como aplicar:
1. Abrir a v284.
2. Colar este bloco inteiro imediatamente ANTES de </body>.
3. Salvar como EntreLinhas_v285_GUIA_INICIAL_REATIVADO_CIRURGICO.html.
-->
<script id="entrel-v285-guia-inicial-cirurgico">
(function(){
  'use strict';

  if (window.__ENTREL_V285_GUIA_INICIAL_CIRURGICO__) return;
  window.__ENTREL_V285_GUIA_INICIAL_CIRURGICO__ = true;

  var VERSION = 'v285';
  var BASE_KEY = 'entrel:onboarding:v278:seen';
  var index = 0;

  var slides = [
    {
      icon:'🌸',
      title:'Bem-vinda ao EntreLinhas',
      text:'Este é o seu espaço para ler, acompanhar sua evolução, participar do clube e transformar a leitura em uma jornada mais leve, bonita e organizada.',
      pills:['Clube do livro','Leitura pessoal','Progresso salvo']
    },
    {
      icon:'🏠',
      title:'Prólogo: seu resumo de leitura',
      text:'No Prólogo você acompanha o livro atual, metas diárias, meta mensal, calendário de leitura, sequência e o Livro do Clube.',
      pills:['Continue lendo','Metas','Calendário']
    },
    {
      icon:'📚',
      title:'Minha Leitura',
      text:'Adicione seus livros e EPUBs, acompanhe páginas lidas, retome de onde parou e mantenha sua biblioteca organizada dentro do app.',
      pills:['Biblioteca pessoal','EPUB','Progresso']
    },
    {
      icon:'💬',
      title:'Clube',
      text:'Na área Clube ficam o Livro do Clube, Biblioteca, Mural, álbuns dos encontros e estatísticas do grupo.',
      pills:['Livro do Clube','Mural','Fotos']
    },
    {
      icon:'🏅',
      title:'Desafios, medalhas e ranking',
      text:'Complete desafios, ganhe XP, desbloqueie medalhas e molduras, acompanhe sua posição no ranking e veja sua evolução no clube.',
      pills:['XP','Medalhas','Ranking']
    },
    {
      icon:'✨',
      title:'Tudo pronto para começar',
      text:'Use o app no seu ritmo. Suas leituras, metas e conquistas formam sua jornada dentro do EntreLinhas.',
      pills:['Iniciar jornada','Explorar app','Boa leitura']
    }
  ];

  function esc(v){
    return String(v == null ? '' : v).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c] || c;
    });
  }

  function hasUser(){
    try{
      return !!(typeof data !== 'undefined' && data && data.user && (data.user.id || data.user.email || data.user.name));
    }catch(e){
      return false;
    }
  }

  function userKey(){
    try{
      var id = '';
      if (typeof data !== 'undefined' && data && data.user) {
        id = data.user.id || data.user.email || data.user.name || '';
      }
      return BASE_KEY + ':' + String(id || 'local');
    }catch(e){
      return BASE_KEY + ':local';
    }
  }

  function seen(){
    try{
      return localStorage.getItem(userKey()) === '1' || localStorage.getItem(BASE_KEY) === '1';
    }catch(e){
      return true;
    }
  }

  function markSeen(){
    try{ localStorage.setItem(userKey(),'1'); }catch(e){}
  }

  function logoHTML(){
    return '<img src="assets/img_001_6644f517278f.png" alt="Logo EntreLinhas" style="width:100%;height:100%;object-fit:cover;border-radius:16px;display:block;" onerror="this.outerHTML=&quot;📖&quot;">';
  }

  function ensureCssFallback(){
    try{
      if (document.getElementById('entrel-v285-guia-inicial-css')) return;
      var st = document.createElement('style');
      st.id = 'entrel-v285-guia-inicial-css';
      st.textContent = [
        '.entrel-welcome-v278-backdrop.entrel-v278-open{display:flex!important;visibility:visible!important;opacity:1!important;pointer-events:auto!important;}',
        '.entrel-welcome-v278-settings-card{position:relative;overflow:hidden;}',
        '.entrel-welcome-v278-settings-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}'
      ].join('\n');
      document.head.appendChild(st);
    }catch(e){}
  }

  function ensureModal(){
    ensureCssFallback();

    var el = document.getElementById('entrel-welcome-v278');
    if (!el) {
      el = document.createElement('div');
      el.id = 'entrel-welcome-v278';
      el.className = 'entrel-welcome-v278-backdrop';
      el.setAttribute('role','dialog');
      el.setAttribute('aria-modal','true');
      el.innerHTML =
        '<div class="entrel-welcome-v278-modal">'+
          '<div class="entrel-welcome-v278-inner">'+
            '<div class="entrel-welcome-v278-top">'+
              '<div class="entrel-welcome-v278-brand">'+
                '<div class="entrel-welcome-v278-logo">'+logoHTML()+'</div>'+
                '<div><strong>EntreLinhas</strong><small>Girls Book Club</small></div>'+
              '</div>'+
              '<button class="entrel-welcome-v278-close" type="button" aria-label="Fechar guia" data-entrel-guia-v285="close">×</button>'+
            '</div>'+
            '<div class="entrel-welcome-v278-card" id="entrel-welcome-v278-slide"></div>'+
            '<div class="entrel-welcome-v278-dots" id="entrel-welcome-v278-dots"></div>'+
            '<div class="entrel-welcome-v278-actions">'+
              '<button type="button" class="entrel-welcome-v278-btn secondary" id="entrel-welcome-v278-back" data-entrel-guia-v285="back">Voltar</button>'+
              '<button type="button" class="entrel-welcome-v278-btn primary" id="entrel-welcome-v278-next" data-entrel-guia-v285="next">Começar</button>'+
            '</div>'+
          '</div>'+
        '</div>';
      document.body.appendChild(el);
    } else {
      try{
        var logo = el.querySelector('.entrel-welcome-v278-logo');
        if (logo && !logo.querySelector('img')) logo.innerHTML = logoHTML();
      }catch(e){}
    }

    if (!el.__entrelV285GuideEvents) {
      el.__entrelV285GuideEvents = true;
      el.addEventListener('click',function(ev){
        try{
          if (ev.target === el) { window.entrelFecharGuiaV278(true); return; }
          var btn = ev.target && ev.target.closest ? ev.target.closest('[data-entrel-guia-v285]') : null;
          var act = btn && btn.getAttribute('data-entrel-guia-v285');
          if (act === 'close') window.entrelFecharGuiaV278(true);
          if (act === 'back') window.entrelGuiaAnteriorV278();
          if (act === 'next') window.entrelGuiaProximoV278();
        }catch(e){}
      },true);
    }

    if (!document.__entrelV285GuideEsc) {
      document.__entrelV285GuideEsc = true;
      document.addEventListener('keydown',function(ev){
        try{
          var box = document.getElementById('entrel-welcome-v278');
          if (ev.key === 'Escape' && box && box.classList.contains('entrel-v278-open')) window.entrelFecharGuiaV278(true);
        }catch(e){}
      },true);
    }

    return el;
  }

  function renderSlide(){
    var s = slides[index] || slides[0];
    var slide = document.getElementById('entrel-welcome-v278-slide');
    var dots = document.getElementById('entrel-welcome-v278-dots');
    var back = document.getElementById('entrel-welcome-v278-back');
    var next = document.getElementById('entrel-welcome-v278-next');

    if (!slide || !dots || !back || !next) return;

    slide.innerHTML =
      '<div class="entrel-welcome-v278-icon">'+esc(s.icon)+'</div>'+
      '<h2 class="entrel-welcome-v278-title">'+esc(s.title)+'</h2>'+
      '<p class="entrel-welcome-v278-text">'+esc(s.text)+'</p>'+
      '<div class="entrel-welcome-v278-list">'+
        (s.pills || []).map(function(p){ return '<div class="entrel-welcome-v278-pill">✓ '+esc(p)+'</div>'; }).join('')+
      '</div>';

    dots.innerHTML = slides.map(function(_,i){
      return '<span class="entrel-welcome-v278-dot '+(i===index?'entrel-v278-active':'')+'"></span>';
    }).join('');

    back.textContent = index === 0 ? 'Pular' : 'Voltar';
    next.textContent = index === 0 ? 'Começar' : (index === slides.length - 1 ? 'Entrar no app' : 'Continuar');
  }

  window.entrelAbrirGuiaAppV278 = function(force){
    if (!force && !hasUser()) return false;
    index = 0;
    var el = ensureModal();
    el.classList.add('entrel-v278-open');
    renderSlide();
    return true;
  };

  window.entrelFecharGuiaV278 = function(save){
    var el = ensureModal();
    el.classList.remove('entrel-v278-open');
    if (save !== false) markSeen();
  };

  window.entrelGuiaProximoV278 = function(){
    if (index < slides.length - 1) {
      index++;
      renderSlide();
    } else {
      window.entrelFecharGuiaV278(true);
    }
  };

  window.entrelGuiaAnteriorV278 = function(){
    if (index <= 0) {
      window.entrelFecharGuiaV278(true);
    } else {
      index--;
      renderSlide();
    }
  };

  window.entrelResetGuiaAppV278 = function(){
    try{
      localStorage.removeItem(userKey());
      localStorage.removeItem(BASE_KEY);
    }catch(e){}
    return true;
  };

  function guideCard(){
    return '<section class="settings-card-v1863 entrel-welcome-v278-settings-card" data-entrel-v285-guia-card="1">'+
      '<div class="settings-head-v1863"><div><strong>✨ Guia inicial do app</strong><p>Reveja a tela de boas-vindas e entenda as principais áreas do EntreLinhas.</p></div></div>'+
      '<div class="settings-note-v1863">Ideal para novos membros entenderem Prólogo, Minha Leitura, Clube, Desafios, Medalhas e Ranking.</div>'+
      '<div class="entrel-welcome-v278-settings-actions">'+
        '<button class="btn" type="button" onclick="entrelAbrirGuiaAppV278(true)">Ver guia do app</button>'+
        '<button class="btn secondary" type="button" onclick="entrelResetGuiaAppV278(); entrelAbrirGuiaAppV278(true)">Mostrar novamente no próximo acesso</button>'+
      '</div>'+
    '</section>';
  }

  function injectCardIntoHTML(html){
    html = String(html || '');
    if (html.indexOf('entrel-welcome-v278-settings-card') >= 0 || html.indexOf('data-entrel-v285-guia-card') >= 0) return html;

    var card = guideCard();
    var marker = '<section class="settings-card-v1863"><div class="settings-head-v1863"><div><strong>📖 Leitura</strong>';
    var idx = html.indexOf(marker);
    if (idx > -1) return html.slice(0,idx) + card + html.slice(idx);

    var pos = html.lastIndexOf('</div>');
    if (pos > -1) return html.slice(0,pos) + card + html.slice(pos);

    return html + card;
  }

  function wrapSettingsFunction(name){
    try{
      var old = window[name];
      if (typeof old !== 'function') return false;
      if (old.__entrelV285Guide) return true;

      var fn = function(){
        return injectCardIntoHTML(old.apply(this, arguments));
      };
      fn.__entrelV285Guide = true;
      fn.__oldSettingsFunction = old;

      window[name] = fn;
      try { if (name === 'settingsScreenV1863') settingsScreenV1863 = fn; }catch(e){}
      try { if (name === 'settingsScreenV65') settingsScreenV65 = fn; }catch(e){}
      try { if (name === 'settingsScreenV66') settingsScreenV66 = fn; }catch(e){}
      return true;
    }catch(e){
      return false;
    }
  }

  function injectCardIfSettingsOpen(){
    try{
      var root = document.querySelector('.settings-v1863') || document.querySelector('#app .settings-v1863');
      if (!root) return false;
      if (root.querySelector('.entrel-welcome-v278-settings-card,[data-entrel-v285-guia-card]')) return true;

      var tmp = document.createElement('div');
      tmp.innerHTML = guideCard();
      root.appendChild(tmp.firstElementChild);
      return true;
    }catch(e){
      return false;
    }
  }

  function autoOpen(){
    try{
      if (!hasUser() || seen()) return;
      if (document.querySelector('.epub-reader,.reader-modal,.reader-overlay,[id*="reader"],[class*="reader"]')) return;

      setTimeout(function(){
        try{
          if (hasUser() && !seen()) window.entrelAbrirGuiaAppV278(false);
        }catch(e){}
      }, 750);
    }catch(e){}
  }

  function boot(){
    ensureCssFallback();
    ensureModal();
    wrapSettingsFunction('settingsScreenV1863');
    wrapSettingsFunction('settingsScreenV65');
    wrapSettingsFunction('settingsScreenV66');
    injectCardIfSettingsOpen();
    autoOpen();
  }

  try{
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }

    setTimeout(boot, 500);
    setTimeout(boot, 1500);
    setTimeout(boot, 3000);

    if (window.MutationObserver) {
      var observer = new MutationObserver(function(){
        wrapSettingsFunction('settingsScreenV1863');
        wrapSettingsFunction('settingsScreenV65');
        wrapSettingsFunction('settingsScreenV66');
        injectCardIfSettingsOpen();
      });
      observer.observe(document.documentElement,{childList:true,subtree:true});
    }

    console.info('[EntreLinhas v285] guia inicial reativado de forma cirúrgica. Use entrelAbrirGuiaAppV278(true).');
  }catch(e){}
})();

</script>
