      const d=new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    function v18PagesRead(userId){
      const u=(data.users||[]).find(x=>x.id===userId)||((data.user&&data.user.id===userId)?data.user:{});
      return Number(u.preservedPagesRead||0)+v18FinishedBooks(userId).reduce((s,b)=>s+Number(b.pages||0),0);

    function v18Comments(user){

    function v18MedalCount(user){

    function v18XP(user){
      const pages=v18PagesRead(user.id);
      const finished=v18FinishedBooks(user.id).length;
      const medals=v18MedalCount(user);
      const comments=v18Comments(user);
      const eventXP=Number(user.eventsAttended||0)*100;
      const monthBookXP=Number(user.monthBookCompleted||0)*200;
      const challengeXP=Number(user.monthlyChallengesCompleted||0)*300;
      const bonus=Number(user.bonusXp||0);
      return pages + finished*100 + medals*50 + comments*5 + eventXP + monthBookXP + challengeXP + bonus;
    }

    function v18LevelInfo(xp){
      const level=Math.min(1000,Math.max(1,Math.floor(xp/200)+1));
      const currentBase=(level-1)*200;
      const nextBase=level*200;
      const current=xp-currentBase;
      const needed=Math.max(1,nextBase-currentBase);
      const pct=level>=1000?100:Math.min(100,Math.round((current/needed)*100));
      const toNext=level>=1000?0:Math.max(0,nextBase-xp);
      return {level,current,needed,pct,toNext};
    }

    function v18ClassInfo(level){
      const bands=[
        [1,50,"Aprendiz","v18-aprendiz","⚪"],
        [51,100,"Leitor","v18-leitor","🟢"],
        [101,200,"Explorador","v18-explorador","🔵"],
        [201,300,"Guardião","v18-guardiao","🟣"],
        [301,400,"Bibliotecário","v18-bibliotecario","🟡"],
        [401,500,"Mestre","v18-mestre","🔴"],
        [501,600,"Sábio","v18-sabio","🧿"],
        [601,700,"Arquivista Lendário","v18-arquivista-lendario","⚪"],
        [701,800,"Imortal das Letras","v18-imortal-das-letras","🟡"],
        [801,900,"Guardião Eterno","v18-guardiao-eterno","🌸"],
        [901,1000,"Lenda EntreLinhas","v18-lenda-entrelinhas","🌈"]
      ];
      return bands.find(b=>level>=b[0]&&level<=b[1])||bands[0];
    }

    function v18DailyProgress(userId){
      if(!data.dailyProgress)data.dailyProgress={};
      const key=v18TodayKey();
      if(!data.dailyProgress[key])data.dailyProgress[key]={};
      if(!data.dailyProgress[key][userId])data.dailyProgress[key][userId]={pages:0,done:false,epubOnly:true,epubBookPages:{}};
      const p=data.dailyProgress[key][userId];
      if(!p.epubBookPages)p.epubBookPages={};
      if(typeof p.epubOnly==="undefined")p.epubOnly=true;
      return p;
    }

    function v18CountEpubDailyPages(bookId,oldPage,newPage){
      const p=v18DailyProgress(data.user.id);
      if(p.done)return;
      const before=Math.max(0,Number(oldPage||0));
      const after=Math.max(before,Number(newPage||0));
      if(!p.epubBookPages)p.epubBookPages={};
      if(typeof p.epubBookPages[bookId]==="undefined")p.epubBookPages[bookId]=before;
      const last=Math.max(Number(p.epubBookPages[bookId]||0),before);
      const gained=Math.max(0,Math.floor(after-last));
      if(gained<=0)return;
      p.epubBookPages[bookId]=after;
      p.pages=Math.min(10,Number(p.pages||0)+gained);
      if(p.pages>=10){
        p.done=true;
        data.user.bonusXp=Number(data.user.bonusXp||0)+20;
        if(!data.user.dailyGoalStreak)data.user.dailyGoalStreak=0;
        data.user.dailyGoalStreak+=1;
        addNotification(data.user.id,"Meta diária concluída","Você leu 10 páginas de EPUB hoje. +20 XP adicionados ao seu progresso.");
        prettyInfo("Meta diária concluída","Você leu 10 páginas dentro de um EPUB hoje e ganhou +20 XP.","Perfeito");
      }
    }

    function v18AddDailyPages(){
      const p=v18DailyProgress(data.user.id);
      if(p.done){
        prettyInfo("Meta diária","Você já concluiu a meta de hoje. Volte amanhã para continuar sua sequência!","Ok");
        return;
      }
      prettyInfo("Meta diária por EPUB","Agora a meta diária só é confirmada automaticamente quando você lê 10 páginas dentro de um livro EPUB no leitor do app.","Entendi");
    }

        d.setDate(today.getDate()-i);
        const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        const done=!!(data.dailyProgress&&data.dailyProgress[key]&&data.dailyProgress[key][userId]&&data.dailyProgress[key][userId].done);
        cells+=`<div class="v18-day ${done?"done":""}" title="${key}">${d.getDate()}</div>`;
      }
      return `<div class="v18-calendar">${cells}</div>`;
    }

    function normalizeBookGenre(raw,title=""){
      const text=String(raw||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      const t=String(title||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      const all=(text+" "+t).trim();
      if(!all)return "";
      if(/romance|romantic|love|contemporary romance|new adult/.test(all))return "Romance";
      if(/fantasy|fantasia|dragon|fae|magia|magic|magical|sword|quarta asa|wing/.test(all))return "Fantasia";
      if(/science fiction|sci[- ]?fi|ficcao cientifica|distopia|dystopian/.test(all))return "Ficção";
      if(/thriller|suspense/.test(all))return "Suspense";
      if(/mystery|misterio|policial|crime|detective|investigacao criminal|investigação criminal|criminologia|delegacia|pericia|perícia|forense/.test(all))return "Investigação criminal";
      if(/politica|política|political|governo|eleicao|eleição|democracia|estado|poder|congresso|senado|presidente/.test(all))return "Política";
      if(/horror|terror|dark/.test(all))return "Terror";
      if(/adventure|aventura/.test(all))return "Aventura";
      if(/biography|biografia|memoir|memorias/.test(all))return "Biografia";
      if(/self help|autoajuda|desenvolvimento pessoal|personal development|motivacional/.test(all))return "Desenvolvimento pessoal";
      if(/poetry|poesia|poems/.test(all))return "Poesia";
      if(/drama/.test(all))return "Drama";
      if(/history|historia|historical/.test(all))return "História";
      if(/religion|religioso|christian|cristao|espiritual/.test(all))return "Religioso";
      if(/young adult|juvenil|ya|teen/.test(all))return "Young Adult";
      return raw?String(raw).split(/[,;|\/]/)[0].trim():"";
    }

    const EPUB_DB_NAME="entrelinhas_epubs_v1";
    const EPUB_STORE_NAME="files";

    /* v18.5.16 - EPUB por usuário
       Cada arquivo agora é salvo com uma chave ligada ao usuário atual.
       Isso evita conflito entre bibliotecas de perfis diferentes no mesmo navegador. */
    function currentUserId(){
      return data && data.user && data.user.id ? String(data.user.id) : "guest";
    }
    function epubStorageKey(bookId,userId){
      return String(userId||currentUserId())+"::"+String(bookId);

    function openEpubDB(){
      return new Promise((resolve,reject)=>{
        if(!window.indexedDB){reject(new Error("Seu navegador não suporta armazenamento EPUB."));return;}
        const req=indexedDB.open(EPUB_DB_NAME,1);
        req.onupgradeneeded=()=>{
          const db=req.result;
          if(!db.objectStoreNames.contains(EPUB_STORE_NAME))db.createObjectStore(EPUB_STORE_NAME,{keyPath:"id"});
        };
        req.onsuccess=()=>resolve(req.result);
        req.onerror=()=>reject(req.error||new Error("Erro ao abrir o banco EPUB."));
      });
    }



    async function cleanupOrphanEpubFiles(){
      const db=await openEpubDB();
      return new Promise((resolve,reject)=>{
        try{
          const active=new Set();
          (data.books||[]).forEach(b=>{
            if(!b)return;
            const uid=String(b.userId||data.user.id||"guest");
            active.add(epubStorageKey(b.id,uid));
            if(b.epubStorageKey)active.add(String(b.epubStorageKey));
            active.add(String(b.id)); // compatibilidade com EPUBs antigos
          });
          const tx=db.transaction(EPUB_STORE_NAME,"readwrite");
          const store=tx.objectStore(EPUB_STORE_NAME);
          const req=store.openCursor();
          let removed=0;
          req.onsuccess=()=>{
            const cursor=req.result;
            if(cursor){
              const key=String(cursor.key||"");
              if(!active.has(key)){
                cursor.delete();
                removed++;
              }
              cursor.continue();
            }
          };
          tx.oncomplete=()=>{db.close();resolve(removed);};
          tx.onerror=()=>{db.close();reject(tx.error||new Error("Erro ao limpar EPUBs antigos."));};
        }catch(e){db.close();reject(e);}
      });
    }

      try{
        const db=await openEpubDB();

          const tx=db.transaction(EPUB_STORE_NAME,"readwrite");

    async function saveEpubFile(id,file,userId){
      const db=await openEpubDB();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(EPUB_STORE_NAME,"readwrite");
        const key=epubStorageKey(id,userId);
        tx.objectStore(EPUB_STORE_NAME).put({
          id:key,
          bookId:id,
          userId:String(userId||currentUserId()),
          name:file.name,
          type:file.type||"application/epub+zip",
          blob:file,
          createdAt:Date.now()
        });
        tx.oncomplete=()=>{db.close();resolve(key);};
        tx.onerror=()=>{db.close();reject(tx.error||new Error("Erro ao salvar EPUB."));};
      });
    }

    async function getEpubFile(id,userId){
      const db=await openEpubDB();
      async function getLocalByKey(store,key){
        return new Promise((resolve)=>{try{const r=store.get(key);r.onsuccess=()=>resolve(r.result||null);r.onerror=()=>resolve(null);}catch(e){resolve(null);}});
      }
      try{
        const local=await new Promise((resolve,reject)=>{
          const tx=db.transaction(EPUB_STORE_NAME,"readonly");
          const store=tx.objectStore(EPUB_STORE_NAME);
          const keys=[];
          const key=epubStorageKey(id,userId);
          keys.push(key,id);
          try{
            const b=(window.data&&Array.isArray(data.books))?data.books.find(x=>String(x.id)===String(id)):null;
            if(b){
              if(b.epubStorageKey)keys.push(String(b.epubStorageKey));
              if(b.epubStoragePath)keys.push(String(b.epubStoragePath));
            }
          }catch(_){ }
          (async()=>{
            for(const k of [...new Set(keys.filter(Boolean))]){const rec=await getLocalByKey(store,k); if(rec){resolve(rec);return;}}
            resolve(null);
          })().catch(()=>resolve(null));
          tx.onerror=()=>reject(tx.error||new Error("Erro ao carregar EPUB."));
        });
        db.close();
        if(local)return local;
      }catch(e){try{db.close();}catch(_){}}
      // v78: se o EPUB veio da Biblioteca do Clube ou da nuvem pessoal, baixa do Supabase e salva no aparelho usando o ID real do livro.
      try{
        const b=(window.data&&Array.isArray(data.books))?data.books.find(x=>String(x.id)===String(id)):null;
        const path=String((b&&(b.epubStoragePath||b.epubStorageKey||b.epub_url||b.epubPath))||'');
        if(path && !path.includes('::')){
          const client=(typeof supaV18638==='function'&&supaV18638())||window.entSupabaseClient||window.supabaseClient||null;
          if(client&&client.storage){
            const buckets=[];
            if((b&&String(b.source||'').includes('club'))||path.includes('club/'))buckets.push('clube-epubs','epubs');
            else buckets.push('epubs','clube-epubs');
            let blob=null, name=(b&&b.epubFileName)||path.split('/').pop()||'livro.epub';
            for(const bucket of buckets){
              try{
                const signed=await client.storage.from(bucket).createSignedUrl(path,120);
                const url=signed&&signed.data&&signed.data.signedUrl;
                if(!url||signed.error)continue;
                const resp=await fetch(url);
                if(resp.ok){blob=await resp.blob();break;}
              }catch(_){ }
            }
            if(blob){
              const file=new File([blob],name,{type:'application/epub+zip'});
              try{await saveEpubFile(id,file,userId||((b&&b.userId)||currentUserId()));}catch(_){ }
              return {id:epubStorageKey(id,userId),bookId:id,userId:String(userId||((b&&b.userId)||currentUserId())),name:name,type:'application/epub+zip',blob:file,createdAt:Date.now()};
            }
          }
        }
      }catch(e){console.warn('Falha ao baixar EPUB online',e);}
      return null;
    }

    async function epubBlobToDataURL(blob){
      return new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onload=()=>resolve(reader.result);

      });
    }

    function epubJoinPath(base,href){
      if(!href)return href;
      if(/^[a-z]+:/i.test(href))return href;
      const parts=(base||"").split("/");parts.pop();
      href.split("/").forEach(part=>{if(!part||part===".")return; if(part==="..")parts.pop(); else parts.push(part);});
      return parts.join("/");
    }

    async function resizeCoverDataUrl(dataUrl,maxW=360,maxH=540,quality=.72){
      if(!dataUrl||!String(dataUrl).startsWith("data:"))return dataUrl||"";
      if(String(dataUrl).length<220000)return dataUrl;
      return new Promise(resolve=>{
        try{
          const img=new Image();
          img.onload=()=>{
            try{
              let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
              const scale=Math.min(1,maxW/w,maxH/h);
              w=Math.max(1,Math.round(w*scale));h=Math.max(1,Math.round(h*scale));
              const canvas=document.createElement("canvas");canvas.width=w;canvas.height=h;
              const ctx=canvas.getContext("2d");ctx.drawImage(img,0,0,w,h);
              resolve(canvas.toDataURL("image/jpeg",quality));
            }catch(e){console.warn("Falha ao compactar capa",e);resolve("");}
          };
          img.onerror=()=>resolve("");
          img.src=dataUrl;
        }catch(e){resolve("");}
      });
    }

    async function extractEpubInfo(file){
      const info={title:(file.name||"Livro EPUB").replace(/\.epub$/i,""),author:"Autor não identificado",cover:"",genre:""};
      try{
        if(window.JSZip){
          const zip=await JSZip.loadAsync(file);
          const containerFile=zip.file("META-INF/container.xml");
          if(containerFile){
            const containerText=await containerFile.async("text");
            const containerDoc=new DOMParser().parseFromString(containerText,"application/xml");
            const rootfile=containerDoc.querySelector("rootfile");
            const opfPath=rootfile&&rootfile.getAttribute("full-path");
            const opfFile=opfPath&&zip.file(opfPath);
            if(opfFile){
              const opfText=await opfFile.async("text");
              const opfDoc=new DOMParser().parseFromString(opfText,"application/xml");
              const titleNode=opfDoc.getElementsByTagName("dc:title")[0]||opfDoc.querySelector("title");
              const creatorNode=opfDoc.getElementsByTagName("dc:creator")[0]||opfDoc.querySelector("creator");
              if(titleNode&&titleNode.textContent.trim())info.title=titleNode.textContent.trim();
              if(creatorNode&&creatorNode.textContent.trim())info.author=creatorNode.textContent.trim();
              const subjectNodes=Array.from(opfDoc.getElementsByTagName("dc:subject")).concat(Array.from(opfDoc.querySelectorAll("subject")));
              const subjects=[...new Set(subjectNodes.map(n=>(n.textContent||"").trim()).filter(Boolean))];
              if(subjects.length)info.genre=normalizeBookGenre(subjects.join(", "),info.title);
              if(!info.genre)info.genre=normalizeBookGenre("",info.title);
              let coverId="";
              Array.from(opfDoc.getElementsByTagName("meta")).forEach(m=>{
                if((m.getAttribute("name")||"").toLowerCase()==="cover")coverId=m.getAttribute("content")||coverId;
              });
              let coverItem=null;
              const items=Array.from(opfDoc.getElementsByTagName("item"));
              if(coverId)coverItem=items.find(it=>(it.getAttribute("id")||"")===coverId);
              if(!coverItem)coverItem=items.find(it=>((it.getAttribute("properties")||"").includes("cover-image")));
              if(!coverItem)coverItem=items.find(it=>/cover/i.test(it.getAttribute("href")||"")&&/^image\//i.test(it.getAttribute("media-type")||""));
              if(coverItem){
                const href=coverItem.getAttribute("href")||"";
                const coverPath=epubJoinPath(opfPath,href);
                const imgFile=zip.file(coverPath);
                if(imgFile){
                  const mime=coverItem.getAttribute("media-type")||"image/jpeg";
                  const blob=await imgFile.async("blob");
                  info.cover=await epubBlobToDataURL(new Blob([blob],{type:mime}));
                }
              }
            }
          }
          return info;
        }
      }catch(e){console.warn("Leitura manual do EPUB falhou",e);}
      if(!window.ePub)return info;
      let url="";
      try{
        url=URL.createObjectURL(file);
        const book=ePub(url);
        const meta=await book.loaded.metadata.catch(()=>null);
        if(meta){
          if(meta.title)info.title=String(meta.title).trim();
          if(meta.creator)info.author=Array.isArray(meta.creator)?meta.creator.join(", "):String(meta.creator).trim();
          const subjects=meta.subject||meta.subjects||meta.category||"";
          if(subjects)info.genre=normalizeBookGenre(Array.isArray(subjects)?subjects.join(", "):String(subjects),info.title);
          if(!info.genre)info.genre=normalizeBookGenre("",info.title);
        }
        try{
          const coverUrl=await book.coverUrl();
          if(coverUrl){
            const res=await fetch(coverUrl);
            const blob=await res.blob();
            info.cover=await epubBlobToDataURL(blob);
          }
        }catch(e){}
        try{book.destroy&&book.destroy();}catch(e){}
      }catch(e){console.warn("Não foi possível ler metadados do EPUB",e);}
      finally{if(url)URL.revokeObjectURL(url);}
      return info;
    }

    async function getEpubPackagePathFromZip(zip){
      const containerFile=zip.file("META-INF/container.xml");
      if(!containerFile)return "";
      const containerText=await containerFile.async("text");
      const containerDoc=new DOMParser().parseFromString(containerText,"application/xml");
      const rootfile=containerDoc.querySelector("rootfile");
      return rootfile?rootfile.getAttribute("full-path")||"":"";
    }

    async function buildSimpleEpub(blob){
      if(!window.JSZip)throw new Error("JSZip indisponível");
      const zip=await JSZip.loadAsync(blob);
      const opfPath=await getEpubPackagePathFromZip(zip);
      if(!opfPath)throw new Error("OPF não encontrado");
      const opfFile=zip.file(opfPath);
      if(!opfFile)throw new Error("Pacote OPF não encontrado");
      const opfText=await opfFile.async("text");
      const opfDoc=new DOMParser().parseFromString(opfText,"application/xml");
      const manifest={};
      Array.from(opfDoc.getElementsByTagName("item")).forEach(item=>{
        const id=item.getAttribute("id")||"";
        const href=item.getAttribute("href")||"";
        const media=item.getAttribute("media-type")||"";
        if(id&&href)manifest[id]={path:epubJoinPath(opfPath,href),media};
      });
      const spine=Array.from(opfDoc.getElementsByTagName("itemref")).map(it=>manifest[it.getAttribute("idref")||""]).filter(Boolean).filter(it=>/html|xhtml|xml/i.test(it.media)||/\.x?html?$/i.test(it.path));
      if(!spine.length)throw new Error("Capítulos não encontrados");
      return {zip,opfPath,spine,index:0,fontSize:window.currentEpubFontSize||100};
    }

    async function openSimpleEpubReader(id,blob){
      const simple=await buildSimpleEpub(blob);
      const bookObj=data.books.find(x=>x.id===id);
      const savedIndex=Math.max(0,Math.min(simple.spine.length-1,Number(bookObj&&bookObj.epubChapterIndex||0)));
      simple.restoreRatio=Math.max(0,Math.min(1,Number(bookObj&&bookObj.epubScrollRatio||0)));
      window.currentEpubReader={id,mode:"simple",simple};
      await renderSimpleEpubChapter(savedIndex,true);
    }

    async function renderSimpleEpubChapter(index,restorePosition=false){
      const reader=window.currentEpubReader;
      if(!reader||reader.mode!=="simple")return;
      const simple=reader.simple;
      simple.index=Math.max(0,Math.min(simple.spine.length-1,index));
      const chapter=simple.spine[simple.index];
      const chapterFile=simple.zip.file(chapter.path);
      if(!chapterFile)throw new Error("Capítulo não encontrado");
      let html=await chapterFile.async("text");
      const doc=new DOMParser().parseFromString(html,"text/html");
      const basePath=chapter.path;
      const imgs=Array.from(doc.querySelectorAll("img[src],image[href],image[xlink\\:href]"));
      for(const img of imgs){
        const attr=img.getAttribute("src")!==null?"src":(img.getAttribute("href")!==null?"href":"xlink:href");
        const src=img.getAttribute(attr)||"";
        if(!src||/^data:|^https?:|^blob:/i.test(src))continue;
        const clean=src.split("#")[0].split("?")[0];
        const imgPath=epubJoinPath(basePath,clean);
        const file=simple.zip.file(imgPath);
        if(file){
          const ext=(imgPath.split(".").pop()||"jpg").toLowerCase();
          const mime=ext==="png"?"image/png":ext==="svg"?"image/svg+xml":ext==="webp"?"image/webp":"image/jpeg";
          const data=await epubBlobToDataURL(await file.async("blob"));
          img.setAttribute(attr,data);
        }
      }
      Array.from(doc.querySelectorAll("script,link[rel='stylesheet']")).forEach(el=>el.remove());
      const body=doc.body?doc.body.innerHTML:html;
      const viewer=document.getElementById("epubViewer");
      if(viewer){
        viewer.innerHTML=`<div class="epub-simple-content" id="epubSimpleContent" style="font-size:${simple.fontSize}%"><article class="epub-simple-page">${body}</article></div>`;
        const scroller=document.getElementById("epubSimpleContent");
        if(scroller){
          scroller.addEventListener("scroll",()=>{
            clearTimeout(window._epubScrollTimer);
            window._epubScrollTimer=setTimeout(updateSimpleEpubProgress,120);
          },{passive:true});
          setTimeout(()=>{
            if(restorePosition&&simple.restoreRatio){
              const max=Math.max(0,scroller.scrollHeight-scroller.clientHeight);
              scroller.scrollTop=max*simple.restoreRatio;
            }
            updateSimpleEpubProgress();
          },120);
        }
      }
      updateSimpleEpubProgress();
    }

      const total=Math.max(1,Math.ceil(scroller.scrollHeight/Math.max(1,scroller.clientHeight)));

      let inside=0;

      return {page,total,chapterIndex:simple.index,chapterTotal:simple.spine.length,inside};

    function getCurrentVisiblePageText(){
      const scroller=document.getElementById("epubSimpleContent");
      if(!scroller)return getCurrentChapterText();
      const pageHeight=Math.max(1,scroller.clientHeight);
      const top=scroller.scrollTop;
      const bottom=top+pageHeight;
      const page=document.querySelector(".epub-simple-page")||scroller;
      const walker=document.createTreeWalker(page,NodeFilter.SHOW_TEXT,{acceptNode(node){
        const text=(node.nodeValue||"").replace(/\s+/g," ").trim();
        if(!text)return NodeFilter.FILTER_REJECT;
        const parent=node.parentElement;
        if(!parent)return NodeFilter.FILTER_REJECT;
        const r=parent.getBoundingClientRect();
        const sr=scroller.getBoundingClientRect();
        const relTop=r.top-sr.top+scroller.scrollTop;
        const relBottom=r.bottom-sr.top+scroller.scrollTop;
        return (relBottom>=top-80 && relTop<=bottom+120)?NodeFilter.FILTER_ACCEPT:NodeFilter.FILTER_REJECT;
      }});
      let parts=[],n;

    function pickEpubVoiceByMode(mode){
      const voices=getEpubVoices();
      if(!voices.length)return null;
      const text=v=>((v.name||"")+" "+(v.lang||"")).toLowerCase();
      const pt=voices.filter(v=>/^pt/i.test(v.lang||"") || /portuguese|português|brasil|brazil|pt-br/.test(text(v)));
      const base=pt.length?pt:voices;
      const femaleRx=/female|feminina|mulher|maria|francisca|luciana|heloisa|leticia|helena|google portuguese/i;
      const maleRx=/male|masculina|homem|masculino|joao|jos[eé]|antonio|carlos|ricardo|felipe|daniel/i;
      let chosen=null;
      if(mode==="male"){
        chosen=base.find(v=>maleRx.test(text(v))) || voices.find(v=>maleRx.test(text(v)));
      }else{
        chosen=base.find(v=>femaleRx.test(text(v))) || voices.find(v=>femaleRx.test(text(v)));
      }
      if(!chosen)chosen=base[0]||voices[0];
      return chosen||null;
    }

      if(selected)utter.voice=selected;

    async function deleteBook(id){
      const b=data.books.find(x=>x.id===id);
      if(!b)return;
      try{
        const uid=(b.userId||data.user.id);
        const preserved=Math.max(
          Number(b.pagesRead||0),
          Number(b.currentPage||0),
          Number(b.readerPage||0),
          (b.status==="finished"||b.finished)?Number(b.pages||0):0
        );
        if(preserved>0){
          const u=(data.users||[]).find(x=>x.id===uid);
          if(u){
            u.preservedPagesRead=Number(u.preservedPagesRead||0)+preserved;
            u.pagesRead=Number(u.pagesRead||0)+preserved;
          }
          if(data.user&&data.user.id===uid){
            data.user.preservedPagesRead=Number(data.user.preservedPagesRead||0)+preserved;
            data.user.pagesRead=Number(data.user.pagesRead||0)+preserved;
          }
        }
      }catch(e){console.warn("preservar paginas ao excluir",e);}
      try{
        if(b.source==="epub"||b.epubStored)await deleteEpubFile(id,b&&b.userId).catch(()=>{});
      }catch(e){console.warn(e);}
      data.books=data.books.filter(x=>x.id!==id);
      save();closeModal();render();
      prettyInfo("Livro excluído","O livro saiu da sua aba Minha Leitura, mas as páginas já lidas foram preservadas para metas, ranking e desafios.","Ok");
    }

    function userBooks(userId){return data.books.filter(b=>b.userId===userId)}
    function userFinishedBooks(userId){return userBooks(userId).filter(b=>b.status==="finished")}
    function userPagesRead(userId){const u=(data.users||[]).find(x=>x.id===userId)||((data.user&&data.user.id===userId)?data.user:{});return Number(u.preservedPagesRead||0)+userFinishedBooks(userId).reduce((s,b)=>s+Number(b.pages||0),0)}
    function userComments(user){return data.messages.filter(m=>m.userName===user.name || m.userId===user.id).length}
    function userLikesReceived(user){return data.messages.filter(m=>m.userName===user.name || m.userId===user.id).reduce((s,m)=>s+Number(m.likes||0),0)}
    function hasFinishedChosenBook(userId){return userFinishedBooks(userId).some(b=>String(b.title||"").toLowerCase()===String(data.secretBookTitle||"").toLowerCase())}


    function medalImageKey(m){
      const id=m.id||"";
      const map={
        seq_1:"seq_1",seq_2:"seq_2",seq_3:"seq_3",seq_4:"seq_4",seq_5:"seq_5",
        pg100:"pg100",pg300:"pg300",pg500:"pg500",pg1000:"pg1000",pg2500:"pg2500",pg5000:"pg5000",pg10000:"pg10000",pg25000:"pg25000",pg50000:"pg50000",pg100000:"pg100000",
        soc1:"soc_first",soc5:"soc_voice",soclikes:"soc_likes",socialma:"soc_soul",
        ev_visitante:"evt_visitante",ev_presenca:"evt_presenca",ev_mes:"evt_leitor_mes",ev_campeao:"evt_campeao",ev_lenda:"evt_lenda",
        sec_noite:"sec_noturno",sec_maratona:"sec_maratona",sec_proibida:"sec_pagina_proibida",sec_sombria:"sec_biblioteca_sombria",sec_escolhido:"sec_escolhido"
      };
      return map[id]||id;
    }

    function medalImageSrc(m){
      const k=medalImageKey(m);
      if(typeof SEQ_MEDAL_IMAGES!=="undefined" && SEQ_MEDAL_IMAGES[k])return SEQ_MEDAL_IMAGES[k];
      if(typeof PAGE_MEDAL_IMAGES!=="undefined" && PAGE_MEDAL_IMAGES[k])return PAGE_MEDAL_IMAGES[k];
      if(typeof SOCIAL_MEDAL_IMAGES!=="undefined" && SOCIAL_MEDAL_IMAGES[k])return SOCIAL_MEDAL_IMAGES[k];
      if(typeof EVENT_MEDAL_IMAGES!=="undefined" && EVENT_MEDAL_IMAGES[k])return EVENT_MEDAL_IMAGES[k];
      if(typeof SECRET_MEDAL_IMAGES!=="undefined" && SECRET_MEDAL_IMAGES[k])return SECRET_MEDAL_IMAGES[k];
      return "";
    }

    function medalProfileHTML(m){
      const src=medalImageSrc(m);
      return src?`<img class="member-medal-img" src="${src}" alt="${m.name||"Medalha"}">`:(m.icon||"🏅");
    }

    function medalTinyHTML(m){
      const src=medalImageSrc(m);
      return src?`<span class="admin-medal-icon"><img class="admin-medal-img" src="${src}" alt="${m.name||"Medalha"}"></span>`:`<span class="admin-medal-icon">${m.icon||"🏅"}</span>`;
    }

    function officialMedals(user){
      const pages=userPagesRead(user.id), comments=userComments(user), likes=userLikesReceived(user);
      const finished=userFinishedBooks(user.id), unlocked=[];
      if(user.streakActive){MEDAL_DEFS.sequence.forEach(m=>{if(Number(user.streakDays||0)>=m.target)unlocked.push({...m,type:"sequence",temporary:true})})}
      MEDAL_DEFS.pages.forEach(m=>{if(pages>=m.target)unlocked.push({...m,type:"pages"})});
      MEDAL_DEFS.social.forEach(m=>{const v=m.metric==="likes"?likes:comments;if(v>=m.target)unlocked.push({...m,type:"social"})});
      MEDAL_DEFS.event.forEach(m=>{if((user.eventMedals||[]).includes(m.id))unlocked.push({...m,type:"event"})});
      if(Number(user.lastReadHour||13)>=0 && Number(user.lastReadHour||13)<5)unlocked.push({...MEDAL_DEFS.secret[0],type:"secret"});
      if((user.secretMedals||[]).includes("sec_maratona"))unlocked.push({...MEDAL_DEFS.secret[1],type:"secret"});
      if((user.secretMedals||[]).includes("sec_proibida"))unlocked.push({...MEDAL_DEFS.secret[2],type:"secret"});
      const dark=finished.filter(b=>/investigação criminal|misterio|fantasia|suspense|terror/i.test(b.genre||b.title||"")).length;
      if(dark>=10)unlocked.push({...MEDAL_DEFS.secret[3],type:"secret"});
      if(hasFinishedChosenBook(user.id))unlocked.push({...MEDAL_DEFS.secret[4],type:"secret"});
      const all=[...MEDAL_DEFS.sequence,...MEDAL_DEFS.pages,...MEDAL_DEFS.social,...MEDAL_DEFS.event,...MEDAL_DEFS.secret];
      (user.manualMedals||[]).forEach(id=>{
        const m=all.find(x=>x.id===id);
        if(m && !unlocked.some(x=>x.id===id))unlocked.push({...m,type:"manual"});
      });
      return unlocked;
    }

    function memberMedals(user, books){
      return officialMedals(user).slice(0,8);
    }
    function medalDescription(user, books){
      const medals=officialMedals(user);
      if(!medals.length)return "Ainda não possui medalhas desbloqueadas.";
      return medals.map(m=>m.name).join(" • ");
    }

      const list=[];

      if(finished>=1)list.push("🏅 Primeiro livro finalizado");
      if(finished>=3)list.push("📚 Leitora dedicada");
      if(pages>=1000)list.push("⭐ Mais de 1000 páginas lidas");
      if(user.role==="admin")list.push("🛡️ Administradora do clube");
      if(user.points>=1000)list.push("👑 Destaque no ranking");
      return list.join(" • ");

    function sendMsg(){
      const text=document.getElementById("msg").value.trim();
      if(!text)return;
      data.messages.push({id:uid(),userId:data.user.id,userName:data.user.name,text,likes:0,likedBy:[],createdAt:Date.now(),edited:false});
      save();render();

    function openEditMessage(id){
      const m=data.messages.find(x=>x.id===id);
      openModal(`
        <h3>Corrigir mensagem</h3>
        <textarea id="editMsgText">${m.text}</textarea>
        <div class="row">

    function saveEditedMessage(id){
      const m=data.messages.find(x=>x.id===id);
      const mine=(m.userId&&m.userId===data.user.id)||m.userName===data.user.name;
      if(!mine || Date.now()-Number(m.createdAt||0)>30*60*1000)return prettyInfo("Tempo esgotado","Você só pode corrigir mensagens por até 30 minutos.","Ok");
      m.text=document.getElementById("editMsgText").value.trim();
      m.edited=true;
      save();closeModal();render();
    }

    function deleteMessage(id){
      const m=data.messages.find(x=>x.id===id);
      const mine=(m.userId&&m.userId===data.user.id)||m.userName===data.user.name;
      const allowed=isAdmin()||(mine&&Date.now()-Number(m.createdAt||0)<=30*60*1000);
      if(!allowed)return prettyInfo("Não permitido","Você só pode apagar suas mensagens por até 30 minutos.","Ok");
      if(!confirm("Apagar esta mensagem para todos?"))return;
      data.messages=data.messages.filter(x=>x.id!==id);
      save();render();
    }

    function reactMsg(id,emoji){
      const m=data.messages.find(x=>x.id===id);
      if(!m)return;
      if(!m.reactions)m.reactions={};
      if(!m.reactedBy)m.reactedBy={};
      const key=data.user.id+":"+emoji;
      if(m.reactedBy[key]){
        m.reactions[emoji]=Math.max(0,(m.reactions[emoji]||0)-1);
        delete m.reactedBy[key];
      }else{
        m.reactions[emoji]=(m.reactions[emoji]||0)+1;
        m.reactedBy[key]=true;
      }
      if(emoji==='❤️')m.likes=m.reactions[emoji]||0;
      save();render();
    }

    function likeMsg(id){
      const m=data.messages.find(x=>x.id===id);
      if(!m.likedBy)m.likedBy=[];
      if(m.likedBy.includes(data.user.id)){
        prettyInfo("Você já reagiu","Você só pode enviar um coração uma vez em cada mensagem.","Entendi");
        return;
      }
      m.likedBy.push(data.user.id);
      m.likes=m.likedBy.length;
      save();render();
    }

    function addPhotoToAlbum(id,file){
      if(!file)return;
      const a=data.albums.find(x=>x.id===id);
      if(a.locked){
        prettyInfo("Pasta trancada","Esta pasta foi trancada pelo administrador. Não é possível adicionar novas fotos.","Entendi");
        return;
      }
      const reader=new FileReader();
      reader.onload=function(e){
        a.photos.push(e.target.result);
        save();
        openAlbum(id);
      };

    function openAdminAdjust(id,type,dir){
      const label=type==='xp'?'XP':'Estrelinhas'; const action=dir>0?'Adicionar':'Remover';
      openModal(`<h3>${action} ${label}</h3><p class="muted">Informe a quantidade e o motivo da alteração.</p><input id="admAmount" class="input" type="number" min="1" value="100"><textarea id="admReason" class="input" placeholder="Motivo" rows="3"></textarea><div class="row"><button class="btn secondary" onclick="closeModal()">Cancelar</button><button class="btn" onclick="adminApplyAdjust('${id}','${type}',${dir})">Confirmar</button></div>`);

    function adminApplyAdjust(id,type,dir){
      const u=(data.users||[]).find(x=>x.id===id); if(!u)return;
      const amount=Math.max(0,Number(document.getElementById('admAmount').value)||0); const reason=(document.getElementById('admReason').value||'Ajuste administrativo').trim();
      if(!amount)return prettyInfo('Valor inválido','Informe uma quantidade maior que zero.','Ok');
      if(type==='xp')u.bonusXp=Number(u.bonusXp||0)+(amount*dir); else {u.points=Number(u.points||0)+(amount*dir);u.rankingPoints=Number(u.rankingPoints||0)+(amount*dir);}
      adminHistory(`${dir>0?'Adicionou':'Removeu'} ${amount} ${type==='xp'?'XP':'Estrelinhas'}`,`${u.name||'Membro'} • ${reason}`,id);
      try{addNotification(u.id,'Ajuste administrativo',`${dir>0?'Recebeu':'Perdeu'} ${amount} ${type==='xp'?'XP':'Estrelinhas'}. Motivo: ${reason}`)}catch(e){}
      closeModal();save();render();
    }
    function adminResetDailyGoalMember(id){
      const u=(data.users||[]).find(x=>x.id===id); if(!u)return;

      adminHistory('Resetou meta diária',`${u.name||'Membro'} voltou para 10 páginas e pode concluir novamente hoje.`,id);
      try{addNotification(u.id,'Meta diária resetada','Sua meta diária voltou para 10 páginas e foi liberada para conclusão novamente.')}catch(e){}
      closeModal();save();render();prettyInfo('Meta resetada','A meta diária foi reiniciada e liberada para o membro cumprir novamente.','Ok');
    }

      adminHistory('Alterou cargo',`${u.name||'Membro'} agora é ${role==='admin'?'administrador':'membro'}.`,id);

function v184FrameDef(id){return PROFILE_FRAME_RULES_V184.find(f=>f.id===id)||PROFILE_FRAME_RULES_V184[1];}
function v184SafeFrameId(id){return id==="none"?"none":(PROFILE_FRAMES_V182[id]?id:"entrelinhas");}
function v184UserLevel(u){try{return v18LevelInfo(v18XP(u)).level}catch(e){return 1}}
function v184EarnedMedalIds(u){try{return new Set(officialMedals(u).map(m=>m.id))}catch(e){return new Set()}}
function v184HasAllCategoryMedals(u,cat){
  const defs=(MEDAL_DEFS&&MEDAL_DEFS[cat])?MEDAL_DEFS[cat]:[];
  if(!defs.length)return false;
  const earned=v184EarnedMedalIds(u);
  return defs.every(m=>earned.has(m.id));
}
function v184ExplorerUnlocked(u){
  const finished=v18FinishedBooks(u.id)||[];
  const genres={};
  finished.forEach(b=>{
    const g=(b.genre||b.category||b.genero||b.tipo||"").trim().toLowerCase();
    if(g)genres[g]=(genres[g]||0)+1;
  });
  return Object.values(genres).filter(n=>n>=5).length>=5;
}
function v184LegendUnlocked(u){
  return v184UserLevel(u)>=100 &&
    v184HasAllCategoryMedals(u,"sequence") &&
    v184HasAllCategoryMedals(u,"pages") &&
    v184HasAllCategoryMedals(u,"social") &&
    v184HasAllCategoryMedals(u,"event") &&
    v184HasAllCategoryMedals(u,"secret") &&
    v18PagesRead(u.id)>1000 &&
    v18FinishedBooks(u.id).length>=100;
}
function v184FrameUnlocked(u,id){
  const f=v184FrameDef(id);
  if(f.always)return true;
  try{return !!f.check(u)}catch(e){return false}
}

(function(){

  function safeUsersV1861(){

  function pagesReadV1861(uid){ const u=(data.users||[]).find(x=>x.id===uid)||((data.user&&data.user.id===uid)?data.user:{}); return Number(u.preservedPagesRead||0)+safeBooksV1861().filter(b=>b.userId===uid).reduce((s,b)=>s+Number(b.pagesRead||b.currentPage||(b.status==='finished'?b.pages:0)||0),0); }

  function miniFrameV1861(u,size){
    try{ if(typeof v184MiniFrameHTML==='function') return v184MiniFrameHTML(u,size||56); }catch(e){}
    const img=u.avatar||u.photo||u.photoUrl||'';

      ['👑 Membro do mês',[...users].sort((a,b)=>pagesReadV1861(b.id)-pagesReadV1861(a.id))[0],u=>pagesReadV1861(u.id)+' páginas']

    const users=safeUsersV1861().sort((a,b)=>Number(b.points||b.xp||0)-Number(a.points||a.xp||0));

<script id="v18611-edit-profile-organizado-js">
(function(){
  function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]||c;});}
  function attr(s){return esc(s).replace(/'/g,'&#39;');}
  function frameRules(){
    if(window.PROFILE_FRAME_RULES_V184 && PROFILE_FRAME_RULES_V184.length) return PROFILE_FRAME_RULES_V184;
    const defs=window.PROFILE_FRAME_DEFS_V182||[];
    const arr=defs.map(function(f){return {id:f.id,name:f.name,icon:f.icon||'',req:'Disponível'};});
    if(!arr.find(function(f){return f.id==='none';})) arr.unshift({id:'none',name:'Sem Moldura',icon:'',req:'Sempre disponível'});
    return arr;
  }
  function currentFrame(){
    try{if(typeof v184CurrentFrameId==='function')return v184CurrentFrameId(data.user);}catch(e){}
    return (data&&data.user&&(data.user.profileFrame||data.user.frame))||'entrelinhas';
  }
  window.v18611SelectedFrame=null;
  window.v18611SelectFrame=function(id){
    window.v18611SelectedFrame=id;
    document.querySelectorAll('.edit-profile-modal-v18611 .frame-card-v184').forEach(function(el){el.classList.toggle('active',el.getAttribute('data-frame-id')===id); const c=el.querySelector('.check'); if(c)c.remove(); if(el.classList.contains('active'))el.insertAdjacentHTML('afterbegin','<span class="check">✓</span>');});
  };
  const oldSave=window.v182SaveEditProfile;
  window.v182SaveEditProfile=function(frameId){
    const n=document.getElementById('editNameV182');
    const b=document.getElementById('editBioV182');
    const f=document.getElementById('editFavoriteBookV18610');
    if(window.data&&data.user){
      if(n&&n.value.trim())data.user.name=n.value.trim();
      if(b)data.user.bio=b.value.trim();
      if(f)data.user.favoriteBook=f.value.trim();
      const selected=window.v18611SelectedFrame || frameId || currentFrame();
      if(selected && (!window.v184FrameUnlocked || v184FrameUnlocked(data.user,selected))) data.user.profileFrame=selected;
      const u=(data.users||[]).find(function(x){return x.id===data.user.id;}); if(u)Object.assign(u,data.user);
    }
    try{if(typeof save==='function')save();}catch(e){}
    try{if(typeof closeModal==='function')closeModal();}catch(e){}
    try{if(typeof render==='function')render();}catch(e){}
  };
  window.v182OpenEditProfile=function(){
    if(!window.data||!data.user||typeof openModal!=='function')return;
    const currentName=data.user.name||'';
    const currentBio=data.user.bio||'';
    const currentFav=data.user.favoriteBook||'';
    const current=currentFrame();
    window.v18611SelectedFrame=current;
    const frames=frameRules().map(function(f){
      const unlocked=(f.id==='none') || !window.v184FrameUnlocked || v184FrameUnlocked(data.user,f.id);
      const active=current===f.id;
      const img=(f.id==='none')?'':((window.PROFILE_FRAMES_V182||{})[f.id]||f.src||'');
      const initial=esc((data.user.name||'E').trim().charAt(0).toUpperCase()||'E');
      return '<button type="button" data-frame-id="'+attr(f.id)+'" class="frame-card-v184 '+(active?'active':'')+' '+(unlocked?'':'locked')+'" onclick="'+(unlocked?'v18611SelectFrame(\''+attr(f.id)+'\')':'v184LockedFrameInfo&&v184LockedFrameInfo(\''+attr(f.id)+'\')')+'">'+
        (active?'<span class="check">✓</span>':'')+
        '<div class="frame-preview-v184">'+(f.id==='none'?'<div class="frame-none-preview">'+initial+'</div>':'<img src="'+attr(img)+'" alt="'+attr(f.name||'Moldura')+'">')+'</div>'+ 
        '<strong>'+esc(((f.icon||'')+' '+(f.name||'Moldura')).trim())+'</strong>'+ 
        '<small>'+(unlocked?(active?'Em uso':'Liberada'):'🔒 '+esc(f.req||'Bloqueada'))+'</small>'+ 
      '</button>';
    }).join('');
    openModal('<div class="edit-profile-modal-v182 edit-profile-modal-v18611">'+
      '<h3>Editar Perfil</h3>'+
      '<div class="edit-section-v18611"><label>Foto de perfil</label><div class="edit-photo-row-v182"><div class="edit-photo-preview-v182" id="editPhotoPreviewV182">'+(typeof v182PreviewPhotoHTML==='function'?v182PreviewPhotoHTML():'')+'</div><label class="btn secondary" for="photoInputV182">Alterar foto</label><input class="photo-input-v182" id="photoInputV182" type="file" accept="image/*" onchange="v182PhotoChanged(this)"></div></div>'+
      '<div class="edit-section-v18611 form-grid-v18611"><div><label>Nome</label><input id="editNameV182" value="'+attr(currentName)+'" placeholder="Seu nome"></div><div><label>Bio</label><textarea id="editBioV182" maxlength="120" placeholder="Escreva uma pequena bio">'+esc(currentBio)+'</textarea></div><div><label>Livro favorito</label><input id="editFavoriteBookV18610" value="'+attr(currentFav)+'" placeholder="Ex: Quarta Asa"></div></div>'+
      '<div class="edit-section-v18611"><h4 style="margin:0 0 6px">Minhas Molduras</h4><p class="muted" style="margin:0 0 12px">Escolha sua moldura. A opção Sem Moldura fica sempre disponível.</p><div class="frames-grid-v184">'+frames+'</div></div>'+
      '<div class="edit-actions-v18611"><button class="btn" onclick="v182SaveEditProfile(window.v18611SelectedFrame)">Salvar alterações</button><button class="btn secondary" onclick="closeModal()">Cancelar</button></div>'+
